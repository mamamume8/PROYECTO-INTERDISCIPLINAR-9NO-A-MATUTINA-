<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unidad Educativa Rosa Olga Villacrés Lozano</title>
    <style>
        /* Estilos generales */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f6f9;
            color: #333;
            text-align: center;
        }

        /* Estilo del Encabezado */
        header {
            background-color: #1a365d;
            color: white;
            padding: 30px 20px;
            position: relative;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        /* Escudo en la parte superior izquierda */
        .logo {
            position: absolute;
            left: 30px;
            top: 50%;
            transform: translateY(-50%);
            width: 100px;
            height: auto;
            background-color: white;
            border-radius: 50%;
            padding: 5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        .header-text h1 {
            margin: 0;
            font-size: 2.2rem;
            letter-spacing: 1px;
        }

        .header-text h2 {
            margin: 10px 0 0;
            font-size: 1.3rem;
            font-weight: 300;
            color: #e2e8f0;
        }

        /* Estilo del contenido principal */
        main {
            padding: 40px 20px;
        }

        .slogan {
            font-size: 2rem;
            font-weight: bold;
            color: #2b6cb0;
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .main-image {
            max-width: 90%;
            width: 800px;
            height: auto;
            border-radius: 12px;
            box-shadow: 0 8px 15px rgba(0,0,0,0.1);
            margin-bottom: 50px;
        }

        /* Cuadrícula para los enlaces de asignaturas */
        .links-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            max-width: 1100px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* Tarjetas de cada asignatura */
        .subject-card {
            background-color: white;
            text-decoration: none;
            color: #2d3748;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 4px 10px rgba(0,0,0,0.08);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            display: flex;
            flex-direction: column;
        }

        .subject-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 12px 20px rgba(0,0,0,0.15);
        }

        .subject-card img {
            width: 100%;
            height: 180px;
            object-fit: cover;
        }

        .subject-card h3 {
            padding: 20px;
            margin: 0;
            font-size: 1.4rem;
            background-color: #edf2f7;
            border-top: 2px solid #e2e8f0;
        }
        
        /* Ajuste responsivo para pantallas pequeñas */
        @media (max-width: 768px) {
            .logo {
                position: static;
                transform: none;
                margin-bottom: 20px;
                width: 80px;
            }
            header {
                display: flex;
                flex-direction: column;
                align-items: center;
            }
        }
    </style>
</head>
<body>

    <header>
        <img src="8fb6e193-c60c-45a3-9f65-8854b661a612 (1).jpg" alt="Escudo de la Unidad Educativa" class="logo">
        <div class="header-text">
            <h1>Unidad Educativa Rosa Olga Villacrés Lozano</h1>
            <h2>Proyecto Interdisciplinario 2026 - 2027 | 9no año Paralelo A</h2>
        </div>
    </header>

    <main>
        <div class="slogan">Conecta, nivela y crea.</div>
        
        <img src="imagen.JPG" alt="Fases del Proyecto Interdisciplinario" class="main-image">

        <div class="links-container">
            
            <a href="matematica.html" class="subject-card">
                <img src="https://images.unsplash.com/photo-1518133910546-b6c2fb7d79e3?auto=format&fit=crop&w=600&q=80" alt="Matemática">
                <h3>Matemática</h3>
            </a>

            <a href="lengua.html" class="subject-card">
                <img src="https://images.unsplash.com/photo-1457369804613-52c61a468e7d?auto=format&fit=crop&w=600&q=80" alt="Lengua y Literatura">
                <h3>Lengua y Literatura</h3>
            </a>

            <a href="ciencias.html" class="subject-card">
                <img src="https://images.unsplash.com/photo-1532094349884-543bc11b234d?auto=format&fit=crop&w=600&q=80" alt="Ciencias Naturales">
                <h3>Ciencias Naturales</h3>
            </a>

            <a href="sociales.html" class="subject-card">
                <img src="https://images.unsplash.com/photo-1524661135-423995f22d0b?auto=format&fit=crop&w=600&q=80" alt="Estudios Sociales">
                <h3>Estudios Sociales</h3>
            </a>

            <a href="eca.html" class="subject-card">
                <img src="https://images.unsplash.com/photo-1460661419201-fd4cecdf8a8b?auto=format&fit=crop&w=600&q=80" alt="Educación Cultural y Artística">
                <h3>Educación Cultural y Artística</h3>
            </a>

            <a href="fisica.html" class="subject-card">
                <img src="https://images.unsplash.com/photo-1461896836934-ffe607ba8211?auto=format&fit=crop&w=600&q=80" alt="Educación Física">
                <h3>Educación Física</h3>
            </a>

            <!-- Link: Inglés -->
            <a href="ingles.html" class="subject-card">
                <img src="https://images.unsplash.com/photo-1516321318423-f06f85e504b3?auto=format&fit=crop&w=600&q=80" alt="Inglés">
                <h3>Inglés</h3>
            </a>

        </div>
    </main>

</body>
</html>
