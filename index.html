        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;

        /* Estilo del Encabezado */
        header {
            background-color: #1a365d;

            padding: 30px 20px;
            position: relative;

        }

        /* Escudo en la parte superior izquierda */
        .logo {
            position: absolute;
            left: 30px;
            top: 50%;
            transform: translateY(-50%);
            width: 100px;
            height: auto;
            background-color: white;
            border-radius: 50%;
            padding: 5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        .header-text h1 {
            margin: 0;
            font-size: 2.2rem;
            letter-spacing: 1px;
        }

        .header-text h2 {
            margin: 10px 0 0;
            font-size: 1.3rem;
            font-weight: 300;
            color: #e2e8f0;
        }

        main {
            padding: 40px 20px;
