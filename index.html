<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unidad Educativa Rosa Olga Villacrés Lozano</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; padding: 0; background-color: #f4f6f9; color: #333; text-align: center; }
        
        /* Encabezado con logo */
        header { 
            background-color: #1a365d; 
            color: white; 
            padding: 20px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            position: relative;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1); 
        }
        
        .logo { 
            position: absolute; 
            left: 20px; 
            width: 80px; 
            height: auto; 
            border-radius: 50%; 
            background: white; 
            padding: 5px;
        }

        .header-text h1 { margin: 0; font-size: 1.8rem; }
        .header-text h2 { margin: 5px 0 0; font-size: 1.1rem; font-weight: 300; color: #e2e8f0; }

        main { padding: 40px 20px; }
        .slogan { font-size: 2rem; font-weight: bold; color: #2b6cb0; margin-bottom: 30px; text-transform: uppercase; }
        .main-image { max-width: 90%; width: 800px; height: auto; border-radius: 12px; box-shadow: 0 8px 15px rgba(0,0,0,0.1); margin-bottom: 50px; }
        
        .links-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; max-width: 1100px; margin: 0 auto; }
        .subject-card { background-color: white; text-decoration: none; color: #2d3748; border-radius: 15px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.08); transition: transform 0.3s; display: flex; flex-direction: column; }
        .subject-card:hover { transform: translateY(-10px); }
        .subject-card img { width: 100%; height: 180px; object-fit: cover; }
        .subject-card h3 { padding: 20px; margin: 0; font-size: 1.4rem; background-color: #edf2f7; }
    </style>
</head>
<body>

    <header>
        <img src="rovl.jpg" alt="Escudo Institucional" class="logo">
        <div class="header-text">
            <h1>Unidad Educativa Rosa Olga Villacrés Lozano</h1>
            <h2>Proyecto Interdisciplinario 2026 - 2027 | 9no año Paralelo A</h2>
        </div>
    </header>

    <main>
        <div class="slogan">Conecta, nivela y crea.</div>
        
        <img src="imagen.JPG" alt="Fases del Proyecto" class="main-image">

        <div class="links-container">
            <a href="matematica.html" class="subject-card">
                <img src="https://images.unsplash.com/photo-1518133910546-b6c2fb7d79e3?auto=format&fit=crop&w=600&q=80" alt="Matemática">
                <h3>Matemática</h3>
            </a>
            <a href="lengua.html" class="subject-card">
                <img src="https://images.unsplash.com/photo-1457369804613-52c61a468e7d?auto=format&fit=crop&w=600&q=80" alt="Lengua y Literatura">
                <h3>Lengua y Literatura</h3>
            </a>
            <a href="ciencias.html" class="subject-card">
                <img src="https://images.unsplash.com/photo-1532094349884-543bc11b234d?auto=format&fit=crop&w=600&q=80" alt="Ciencias Naturales">
                <h3>Ciencias Naturales</h3>
            </a>
            <a href="sociales.html" class="subject-card">
                <img src="https://images.unsplash.com/photo-1524661135-423995f22d0b?auto=format&fit=crop&w=600&q=80" alt="Estudios Sociales">
                <h3>Estudios Sociales</h3>
            </a>
            <a href="eca.html" class="subject-card">
                <img src="https://images.unsplash.com/photo-1460661419201-fd4cecdf8a8b?auto=format&fit=crop&w=600&q=80" alt="ECA">
                <h3>Educación Cultural y Artística</h3>
            </a>
            <a href="fisica.html" class="subject-card">
                <img src="https://images.unsplash.com/photo-1461896836934-ffe607ba8211?auto=format&fit=crop&w=600&q=80" alt="Educación Física">
                <h3>Educación Física</h3>
            </a>
            <a href="ingles.html" class="subject-card">
                <img src="https://images.unsplash.com/photo-1516321318423-f06f85e504b3?auto=format&fit=crop&w=600&q=80" alt="Inglés">
                <h3>Inglés</h3>
            </a>
        </div>
    </main>

</body>
</html>
